services:
  - type: web
    name: ja-homes-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # ── Set these in the Render Dashboard → Environment tab ──
      # - key: MONGODB_URI
      #   value: mongodb+srv://<user>:<pass>@cluster.mongodb.net/ja-homes
      # - key: JWT_SECRET
      #   value: <your-secret>
      # - key: CORS_ORIGIN
      #   value: http://localhost:3000, https://jahomess.com, https://www.jahomess.com, https://ja-homes.vercel.app, https://ja-homes.onrender.com
      # - key: ADMIN_EMAIL
      #   value: info.jahomess@gmail.com
      # - key: CLOUDINARY_CLOUD_NAME
      #   value: <your-cloud-name>
      # - key: CLOUDINARY_API_KEY
      #   value: <your-api-key>
      # - key: CLOUDINARY_API_SECRET
      #   value: <your-api-secret>
      # - key: RESEND_API_KEY
      #   value: <your-resend-key>
      # - key: EMAIL_FROM
      #   value: "JA Homes <onboarding@resend.dev>"
